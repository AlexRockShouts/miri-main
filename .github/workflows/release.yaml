name: Release Miri Main & SDK

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger
    inputs:
      tag_name:
        description: 'Tag name to create (e.g., v1.0.0). If empty, it will increment the current tag.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: write
  attestations: write
  packages: write
  security-events: write

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run tests
        run: go test -v -race ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.tag_name }}" ]; then
              TAG_NAME="${{ github.event.inputs.tag_name }}"
            else
              # Fetch all tags
              git fetch --tags
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              echo "Latest tag found: $LATEST_TAG"
              
              # Increment patch version (assuming semver vX.Y.Z)
              VERSION_PART=${LATEST_TAG#v}
              IFS='.' read -r major minor patch <<< "$VERSION_PART"
              NEW_PATCH=$((patch + 1))
              TAG_NAME="v$major.$minor.$NEW_PATCH"
              echo "Incremented tag: $TAG_NAME"
            fi
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          if ! git rev-parse "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            git tag ${{ steps.version.outputs.tag_name }}
            git push origin ${{ steps.version.outputs.tag_name }}
          else
            echo "Tag ${{ steps.version.outputs.tag_name }} already exists"
          fi
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Go Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-binaries:
    name: Build Cross-Platform Standalone Binaries
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: miri-main
      - name: Checkout dashboard
        uses: actions/checkout@v4
        with:
          repository: AlexRockShouts/miri-dashboard
          path: miri-dashboard
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build SDK & Dashboard
        run: |
          cd miri-main/api/sdk/typescript
          npm install && npm run build
          cd ../../../../miri-dashboard
          sed -i 's|file:../../GolandProjects/miri-main/api/sdk/typescript|file:../miri-main/api/sdk/typescript|' package.json
          npm install && npm run build
          mkdir -p ../miri-main/src/cmd/server/dashboard
          cp -r build/* ../miri-main/src/cmd/server/dashboard/
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'miri-main/go.mod'
      - name: Build binary
        working-directory: miri-main
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="miri-server-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -trimpath -ldflags '-s -w' -o "bin/${BINARY_NAME}" ./src/cmd/server/main.go
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}-${{ matrix.arch }}
          path: miri-main/bin/
      - name: Attest Binary
        uses: actions/attest-build-provenance@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          subject-path: "miri-main/bin/miri-server-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}"

  publish-sdk:
    name: Publish TS SDK
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies and generate SDK
        run: |
          npm install -g @openapitools/openapi-generator-cli
          make ts-sdk-generate
          make ts-sdk-install
      - name: Build SDK
        run: make ts-sdk-build
      - name: Publish to npm
        run: make ts-sdk-publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build and Push Docker Image
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: miri-main
      - name: Checkout dashboard
        uses: actions/checkout@v4
        with:
          repository: AlexRockShouts/miri-dashboard
          path: miri-dashboard
      - name: Set up QEMU
        uses: actions/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./miri-main/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/miri-combined:latest
            ${{ secrets.DOCKER_USERNAME }}/miri-combined:${{ needs.security-scan.outputs.tag_name }}
      - name: Attest Docker Image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_USERNAME }}/miri-combined
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/miri-combined:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  release:
    name: Create GitHub Release
    needs: [build-binaries, publish-sdk, docker, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.security-scan.outputs.tag_name }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
